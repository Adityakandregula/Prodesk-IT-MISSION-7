name: Build and publish docs folder

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-publish-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy dist to docs
        run: |
          rm -rf docs || true
          mkdir -p docs
          cp -r dist/* docs/

      - name: Commit and push docs
        uses: EndBug/add-and-commit@v9
        with:
          message: "chore: publish site to docs [skip ci]"
          add: 'docs'
          author_name: 'github-actions'
          author_email: 'actions@github.com'
          branch: main
          push: true
